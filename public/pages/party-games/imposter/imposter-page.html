<script>
    const gamemode = "imposter";
    const helpContainerFile = "party-games/" + gamemode + '.json';
    const formattedGamemode = gamemode.split("-").map(word => word.charAt(0).toUpperCase() + word.slice(1)).join(" ");

    document.documentElement.style.setProperty('--primarypagecolour', '#3DA7A1');
    document.documentElement.style.setProperty('--secondarypagecolour', '#2A6E6A');

    window.pageScripts = {
