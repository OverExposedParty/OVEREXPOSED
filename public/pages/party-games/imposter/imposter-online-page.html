<!DOCTYPE html>
<html lang="en">

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <link rel="stylesheet" href="/css/general/header.css">

    <link rel="stylesheet" href="/css/general/online/user-customisation-icon.css">
    <link rel="stylesheet" href="/css/party-games/gamemode/online/results-chart.css">
    <link rel="stylesheet" href="/css/party-games/online.css">

    <link rel="icon" type="image/x-icon" href="/images/meta/favicons/party-games/imposter/in-game/favicon.ico">
    <link rel="icon" type="image/png" sizes="16x16"
        href="/images/meta/favicons/party-games/imposter/in-game/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32"
        href="/images/meta/favicons/party-games/imposter/in-game/favicon-32x32.png">

<body>
    <div class="splash-screen-container-static" id="splash-screen-container-static">
        <img src="/images/splash-screens/imposter.png" alt="Splash Screen">
    </div>
    <div class="splash-screen-container" id="splash-screen-container">
        <img src="/images/splash-screens/imposter.png" alt="Splash Screen">
        <p></p>
    </div>

    <div class="chat-box">
        <div class="chat-input">
            <input type="text" placeholder="Type a message...">
        </div>
        <div class="chat-messages">
        </div>
    </div>

    <div id="placeholder-gamemode-addons-container" data-online="true">
    </div>

    <div id="header-placeholder"></div>
    <div id="placeholder-card-container" data-gamemode="imposter" data-online="true" data-timer="true">
        <div class="card-container " id="private-view">
            <div class="content" data-text-size="large">
                <div class="regular-button-container">
                    <button id="button-choose-player" class="question-button">Choose Player</button>
                </div>
            </div>
        </div>
    </div>

    <div class="main-container">
        <div id="placeholder-selected-user-container" data-template="imposter"></div>
        <div class="gamemode-popup-container" id="results-container">
            <h1>Results</h1>
            <div id="tableWrapper"></div>
        </div>
    </div>
</body>
<script>
    const gamemode = "imposter";
    const sessionPartyType = "party-game-imposter";
    const helpContainerFile = "party-games-online/" + gamemode + '.json';
    const formattedGamemode = gamemode.split("-").map(word => word.charAt(0).toUpperCase() + word.slice(1)).join(" ");
    document.documentElement.style.setProperty('--primarypagecolour', '#3DA7A1');
    document.documentElement.style.setProperty('--secondarypagecolour', '#2A6E6A');

    window.pageScripts = {
        "https://cdn.socket.io/4.8.1/socket.io.min.js": { zIndex: 0 },

        "/scripts/general/online/user-customisation-icon.js": { addDataLoaded: true, zIndex: 1 },
        "/scripts/html-templates/online/card-container-template.js": { addDataLoaded: true, zIndex: 1 },
        "/scripts/party-games/gamemode/online/general/party-game-statistics.js": { zIndex: 1 },
        "/scripts/html-templates/online/selected-user-containers-template.js": { addDataLoaded: true, zIndex: 1 },
        "/scripts/party-games/online/online-settings.js": { addDataLoaded: true, zIndex: 1 },
        "/scripts/html-templates/gamemode/gamemode-addons-containers.js": { zIndex: 1 },
        "/scripts/party-games/general/load-questions.js": { zIndex: 1 },
        "/scripts/party-games/general/chat-log.js": { zIndex: 1 },

        "/scripts/party-games/gamemode/online/general/party-games-online-instructions.js": { zIndex: 2 },
        "/scripts/party-games/gamemode/online/imposter/imposter-online.js": { addDataLoaded: true, cacheBustKey: "PARTY_GAMES_ONLINE_IMPOSTER", zIndex: 2 },
    };

</script>
<script src="/scripts/html-templates/core-template.js" data-loaded="false"></script>
<script>
    document.getElementById("og-url")?.setAttribute("content", window.location.href);
    waitForFunction("FetchHelpContainer", () => {
        FetchHelpContainer(helpContainerFile);
    })
</script>

</html>
