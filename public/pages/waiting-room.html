<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WAITING ROOM</title>

    <link rel="stylesheet" href="/css/general/header.css">
    <link rel="stylesheet" href="/css/general/waiting-room.css">
    <link rel="stylesheet" href="/css/party-games/mafia-gamemode-settings.css">

    <link rel="icon" type="image/png" sizes="15x16" href="/images/icons/overexposed/favicons/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="30x32" href="/images/icons/overexposed/favicons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="89x96" href="/images/icons/overexposed/favicons/favicon-96x96.png">
    <link rel="icon" type="image/png" sizes="167x180" href="/images/icons/overexposed/favicons/favicon-180x180.png">
</head>


<body>
    <div class="splash-screen-container-static" id="splash-screen-container-static">
        <img src="/images/splash-screens/overexposed.png" alt="Splash Screen" loading="eager">
    </div>
    <div class="splash-screen-container waiting-room" id="splash-screen-container">
        <img src="/images/splash-screens/overexposed.png" alt="Splash Screen" loading="eager">
        <p></p>
    </div>

    <div class="chat-box">
        <div class="chat-input">
            <input type="text" placeholder="Type a message...">
        </div>
        <div class="chat-messages">
        </div>
    </div>

    <div id="header-placeholder" data-key="waiting-room"></div>
    <div id="user-customisation-placeholder" class="waiting-room"></div>

    <div class="error-container username gamemode-settings mafia-gamemode-settings " id="placeholder-error-container">
    </div>

    <div class="main-container">
        <div class="waiting-room-container">
            <div class="settings-tab-container">
                <button id="packs-settings" class="settings-tab active">Packs</button>
                <button id="rules-settings" class="settings-tab">Rules</button>
                <button id="online-settings" class="settings-tab disabled">Online</button>
            </div>
            <div id="gamemode-settings-placeholder" data-template="waiting-room"></div>
            <button class="start-game-button ready-up" id="waiting-room">READY</button>
        </div>

        <div class="waiting-container" id="party-does-not-exist">
            <h2>Party does not exist</h2>
        </div>

        <div class="waiting-container" id="party-session-in-progress">
            <h2>Party is already in progress</h2>
        </div>

        <div class="waiting-container" id="user-kicked">
            <h2>You've been kicked</h2>
        </div>

        <div class="waiting-container" id="party-disbanded-container">
            <h2>Party Has Been disbanded</h2>
        </div>

        <div class="waiting-container" id="party-full">
            <h2>Party is full</h2>
        </div>
    </div>
    <div id="enter-username-placeholder" data-template="waiting-room"></div>
</body>
<script>
    document.documentElement.style.setProperty('--primarypagecolour', '#66CCFF');
    document.documentElement.style.setProperty('--secondarypagecolour', '#427BB9');

    window.pageScripts = {
        "https://cdn.socket.io/4.8.1/socket.io.min.js": {},

        "/scripts/party-games/online/online-settings.js": { addDataLoaded: true },

        "/scripts/html-templates/gamemode-settings/gamemode-settings-template.js": { addDataLoaded: true },
        "/scripts/html-templates/online/enter-username-template.js": { addDataLoaded: true },
        "/scripts/html-templates/gamemode-settings/error-container-template.js": { addDataLoaded: true },
        "/scripts/html-templates/online/html-template-user-customisation.js": { addDataLoaded: true },

        "/scripts/party-games/gamemode-settings/error-game-settings.js": {},
        "/scripts/party-games/general/chat-log.js": {},
        "/scripts/general/online/user-customisation-icon.js": { addDataLoaded: true },
        '/scripts/general/online/user-customisation.js': { addDataLoaded: true },
    };

</script>
<script src="/scripts/html-templates/core-template.js" data-loaded="false"></script>

</html>
