    <link id="favicon-ico" rel="icon" type="image/x-icon"
        href="/images/meta/favicons/party-games/party-does-not-exist/favicon.ico">
    <link id="favicon-16" rel="icon" type="image/png" sizes="16x16"
        href="/images/meta/favicons/party-games/party-does-not-exist/favicon-16x16.png">
    <link id="favicon-32" rel="icon" type="image/png" sizes="32x32"
        href="/images/meta/favicons/party-games/party-does-not-exist/favicon-32x32.png">

<body>
    <div class="splash-screen-container-static" id="splash-screen-container-static">
        <img src="/images/splash-screens/overexposed.png" alt="Splash Screen" loading="eager">
    </div>
    <div class="splash-screen-container waiting-room" id="splash-screen-container">
        <img src="/images/splash-screens/overexposed.png" alt="Splash Screen" loading="eager">
        <p></p>
    </div>

    <div class="chat-box">
        <div class="chat-input">
            <input type="text" placeholder="Type a message...">
        </div>
        <div class="chat-messages">
        </div>
    </div>

    <div id="header-placeholder" data-key="waiting-room"></div>
    <div id="user-customisation-placeholder" class="waiting-room"></div>
    <div id="qr-code-container-placeholder"></div>

    <div class="error-container username gamemode-settings mafia-gamemode-settings " id="placeholder-error-container">
    </div>

    <div class="main-container">
        <div class="main-settings-container waiting-room-container is-visible">
            <div class="settings-tab-container">
                <button id="packs-settings" class="settings-tab active">Packs</button>
                <button id="rules-settings" class="settings-tab">Rules</button>
                <button id="online-settings" class="settings-tab disabled">Online</button>
            </div>
            <div id="gamemode-settings-placeholder" data-template="waiting-room"></div>
            <button class="start-game-button ready-up" id="waiting-room">READY</button>
        </div>

        <div class="waiting-container" id="party-session-in-progress">
            <h1>Game Already Started</h1>
            <p>You can’t join mid-game. create a new game.</p>
        </div>

        <div class="waiting-container" id="user-kicked">
            <h2>You've been kicked</h2>
        </div>

        <div class="waiting-container" id="party-disbanded-container">
            <h2>Party Has Been disbanded</h2>
        </div>

        <div class="waiting-container" id="party-full">
            <h2>Party is full</h2>
        </div>
    </div>
    <div id="enter-username-placeholder" data-template="waiting-room"></div>
</body>
<script>
    document.documentElement.style.setProperty('--primarypagecolour', '#999999');
    document.documentElement.style.setProperty('--secondarypagecolour', '#666666');

    window.pageScripts = {

        "/scripts/party-games/online/online-settings.js": { addDataLoaded: true, zIndex: 1 },

        "/scripts/html-templates/gamemode-settings/qr-code-container-template.js": { addDataLoaded: true, cacheBustKey: "PARTY_GAMES_SETTINGS", zIndex: 1 },
        "/scripts/html-templates/online/enter-username-template.js": { addDataLoaded: true, cacheBustKey: "PARTY_GAMES_SETTINGS", zIndex: 1 },
        "/scripts/html-templates/gamemode-settings/error-container-template.js": { addDataLoaded: true, cacheBustKey: "PARTY_GAMES_SETTINGS", zIndex: 1 },
        "/scripts/html-templates/online/html-template-user-customisation.js": { addDataLoaded: true, cacheBustKey: "PARTY_GAMES_SETTINGS", zIndex: 1 },
        "/scripts/general/online/user-customisation-icon.js": { addDataLoaded: true, cacheBustKey: "PARTY_GAMES_SETTINGS", zIndex: 1 },
        "/scripts/general/online/user-customisation-header.js": { addDataLoaded: true, zIndex: 1 },

        "/scripts/party-games/gamemode-settings/error-game-settings.js": { zIndex: 2 },
        "/scripts/party-games/general/chat-log.js": { zIndex: 2 },
        '/scripts/general/online/user-customisation.js': { addDataLoaded: true, cacheBustKey: "PARTY_GAMES_SETTINGS", zIndex: 2 },
        "/scripts/party-games/waiting-room/waiting-room.js": { addDataLoaded: true, cacheBustKey: "PARTY_GAMES_WAITING_ROOM", zIndex: 2 },
    };

</script>
<script src="/scripts/html-templates/core-template.js" data-loaded="false"></script>

</html>
